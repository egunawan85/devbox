#cloud-config
# devbox first-boot setup (DigitalOcean / Ubuntu 24.04).
#
# This file is a TEMPLATE rendered by the `devbox` CLI, which fills in the login
# user, the SSH port, and the list of authorized public keys before upload.
# It sets up the box and user, hardens SSH, and installs the toolchain.
#
# It deliberately does NOT clone the repo or store any secret — the repo clone and
# config install happen later in `devbox configure`, over an agent-forwarded SSH
# session (so a private repo uses the operator's forwarded key, not a key at rest).

users:
  - name: __DEVBOX_USER__
    groups: [sudo]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
__AUTHORIZED_KEYS_BLOCK__

package_update: true
package_upgrade: true
packages:
  - git
  - curl
  - ca-certificates
  - jq
  - build-essential

write_files:
  # SSH hardening drop-in (sshd reads this in addition to the main config).
  - path: /etc/ssh/sshd_config.d/10-devbox.conf
    permissions: '0644'
    content: |
      Port __SSH_PORT__
      PasswordAuthentication no
      PermitRootLogin no
      PubkeyAuthentication yes
      AllowAgentForwarding yes
      X11Forwarding no
  # Ubuntu 24.04 ships SSH as a socket-activated service; the socket's
  # ListenStream overrides sshd_config's Port. Point the socket at our port too.
  - path: /etc/systemd/system/ssh.socket.d/10-devbox-port.conf
    permissions: '0644'
    content: |
      [Socket]
      ListenStream=
      ListenStream=__SSH_PORT__

runcmd:
  # --- GitHub CLI (gh) apt repo ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /etc/apt/keyrings/githubcli-archive-keyring.gpg
  - chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
  - 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list'
  # --- Node.js LTS (NodeSource) ---
  - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  - apt-get update
  - apt-get install -y gh nodejs
  # --- Claude Code CLI ---
  - npm install -g @anthropic-ai/claude-code
  # --- OpenBao (the vault; installed now, started on demand by `devbox vault up`) ---
  #     PINNED version + SHA256 verification against the release's published checksums
  #     (M-3). Asset `openbao_<ver>_linux_<arch>.deb` installs the `bao` binary.
  #     Bump OPENBAO_VER to update; check https://github.com/openbao/openbao/releases.
  - |
    set -e
    OPENBAO_VER=2.5.4
    arch=$(dpkg --print-architecture)
    deb="openbao_${OPENBAO_VER}_linux_${arch}.deb"
    base="https://github.com/openbao/openbao/releases/download/v${OPENBAO_VER}"
    curl -fsSL -o "/tmp/${deb}" "${base}/${deb}"
    curl -fsSL -o /tmp/openbao-checksums.txt "${base}/checksums-linux.txt"
    ( cd /tmp && grep "  ${deb}\$" openbao-checksums.txt | sha256sum -c - )
    dpkg -i "/tmp/${deb}" || apt-get install -f -y
    rm -f "/tmp/${deb}" /tmp/openbao-checksums.txt
    command -v bao >/dev/null || { echo "FATAL: bao binary not found after OpenBao install" >&2; exit 1; }
  # --- Pin GitHub's host keys (fetched over TLS) so the box's git clone needs no
  #     TOFU; self-updates if GitHub rotates keys (M3) ---
  - 'curl -fsSL https://api.github.com/meta | jq -r ".ssh_keys[] | \"github.com \" + ." >> /etc/ssh/ssh_known_hosts'
  # --- Apply SSH port change, then VERIFY the listener is on the right port before
  #     signaling ready. Do NOT swallow a socket-restart failure (M1): if sshd ends
  #     up stranded on 22 (firewalled), fail loudly and leave devbox-ready absent so
  #     the operator's wait loop times out instead of reporting false success. ---
  - |
    set -e
    systemctl daemon-reload
    systemctl restart ssh.socket
    systemctl restart ssh
    for i in $(seq 1 15); do
      ss -ltn | grep -q ":__SSH_PORT__ " && break
      sleep 1
    done
    ss -ltn | grep -q ":__SSH_PORT__ " || { echo "FATAL: sshd not listening on __SSH_PORT__" >&2; exit 1; }
    command -v bao >/dev/null || { echo "FATAL: OpenBao (bao) missing — provisioning incomplete" >&2; exit 1; }
    touch /var/lib/cloud/devbox-ready
